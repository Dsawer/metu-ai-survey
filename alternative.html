  <style>
:root {
  
  --paper:        #ece4d4;   
  --paper-2:      #e3dac7;   
  --surface:      #fbf7ee;   
  --surface-2:    #f3ecdd;   
  --ink:          #221f1a;   
  --ink-soft:     #5b5448;
  --ink-faint:    #8c8475;
  --line:         #d8cdb7;   
  --line-strong:  #c2b599;

  
  --accent:       #ca0000;
  --accent-2:     #e22525;
  --accent-press: #a30000;
  --accent-soft:  rgba(202,0,0,.10);
  --accent-softer:rgba(202,0,0,.05);
  --ink-blue:     #1d4060;   

  
  --terra:        #b9512f;   
  --ochre:        #c08a3e;   
  --moss:         #4d6b3c;   
  --moss-soft:    rgba(77,107,60,.14);

  
  --metu:         #ca0000;
  --metu-2:       #e23232;
  --metu-soft:    rgba(202,0,0,.30);

  
  --ok:           var(--moss);
  --ok-soft:      var(--moss-soft);
  --danger:       #b03a2e;
  --danger-soft:  rgba(176,58,46,.09);
  --warn:         #c08a3e;

  
  --v1: #a8432c;  
  --v2: #c17a45;  
  --v3c: #8a7f63; 
  --v4: #56768f;  
  --v5: #214a6c;  

  --shadow-sm: 0 1px 2px rgba(40,30,15,.05), 0 10px 28px rgba(40,30,15,.07);
  --shadow-md: 0 22px 56px rgba(30,22,10,.22);
  --radius: 16px;
  --radius-sm: 11px;
  --topbar-h: 56px;
  --maxw: 940px;

  --font-display: "Fraunces", Georgia, "Times New Roman", serif;
  --font-body: "IBM Plex Sans", system-ui, "Segoe UI", sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  color: var(--ink);
  background-color: var(--paper);
  
  background-image:
    radial-gradient(1100px 620px at 84% -8%, rgba(29,64,96,.06), transparent 62%),
    radial-gradient(900px 520px at 6% 102%, rgba(185,81,47,.05), transparent 60%),
    linear-gradient(rgba(29,64,96,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(29,64,96,.035) 1px, transparent 1px);
  background-size: auto, auto, 30px 30px, 30px 30px;
  
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.55;
  min-height: 100vh;
}
svg { display: block; }
::selection { background: rgba(185,81,47,.22); }

.topbar { position: sticky; top: 0; z-index: 80; background: var(--surface); border-bottom: 1px solid var(--line-strong); box-shadow: 0 1px 0 rgba(255,255,255,.5) inset; }
.topbar-inner { max-width: var(--maxw); margin: 0 auto; min-height: var(--topbar-h); padding: 8px clamp(14px,4vw,26px); display: flex; align-items: center; justify-content: space-between; gap: 18px; }
.brand { display: flex; align-items: center; gap: 11px; font-family: var(--font-display); font-weight: 600; font-optical-sizing: auto; letter-spacing: -.01em; color: var(--ink); text-decoration: none; font-size: 16px; flex: none; }
.brand-logo { height: 26px; width: auto; flex: none; display: block; }
.progress { display: flex; align-items: center; gap: 12px; flex: 1; max-width: 440px; min-width: 0; }
.progress-track { flex: 1; height: 6px; border-radius: 999px; background: var(--paper-2); overflow: hidden; box-shadow: inset 0 1px 2px rgba(40,30,15,.12); }
.progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--metu), var(--metu-2)); border-radius: 999px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.progress-text { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--metu); white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 54px; text-align: right; }

.stepper { position: relative; z-index: 60; background: var(--surface-2); border-bottom: 1px solid var(--line); }
.stepper[hidden] { display: none; }
.stepper-inner { max-width: var(--maxw); margin: 0 auto; padding: 9px clamp(14px,4vw,26px); display: flex; align-items: center; gap: 4px; overflow-x: auto; scrollbar-width: none; }
.stepper-inner::-webkit-scrollbar { display: none; }
.step { display: flex; align-items: center; gap: 8px; flex: none; }
.step-btn { display: flex; align-items: center; gap: 9px; cursor: pointer; background: transparent; border: 0; font: inherit; color: var(--ink-faint); padding: 4px 7px; border-radius: 9px; white-space: nowrap; transition: color .15s ease; }
.step-dot { width: 26px; height: 26px; border-radius: 8px; flex: none; display: grid; place-items: center; font-family: var(--font-mono); font-size: 12.5px; font-weight: 600; background: var(--paper); color: var(--ink-soft); border: 1.5px solid var(--line-strong); transition: all .18s ease; }
.step-label { font-size: 13px; font-weight: 500; }
.step.active .step-btn { color: var(--ink); }
.step.active .step-dot { background: var(--metu); color: #fff; border-color: var(--metu); box-shadow: 0 4px 12px var(--metu-soft); }
.step.done .step-dot { background: var(--moss); color: var(--surface); border-color: var(--moss); }
.step.locked .step-btn { cursor: not-allowed; color: var(--ink-faint); opacity: .6; }
.step.locked .step-dot { background: transparent; border-style: dashed; border-color: var(--line-strong); color: var(--ink-faint); }
.step.locked .step-dot svg { width: 13px; height: 13px; }
.step-line { width: 20px; height: 2px; background: var(--line-strong); border-radius: 2px; flex: none; opacity: .7; }
.step:last-child .step-line { display: none; }

.view { max-width: var(--maxw); margin: 0 auto; padding: clamp(22px,4vw,44px) clamp(14px,4vw,26px) 56px; outline: none; }
.page { animation: pagein .34s cubic-bezier(.2,.7,.2,1); }
@keyframes pagein { from { opacity: 0; transform: translateY(10px); } }

.hero-logo { height: 64px; width: auto; display: block; margin: 0 0 22px; }
.eyebrow { margin: 0 0 12px; font-family: var(--font-mono); font-size: 11.5px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: var(--terra); }
.welcome h1 { font-family: var(--font-display); font-optical-sizing: auto; font-size: clamp(34px,6vw,58px); line-height: 1.02; letter-spacing: -.02em; margin: 0 0 18px; font-weight: 600; }
.welcome-sub { font-size: clamp(15px,1.9vw,18px); color: var(--ink-soft); max-width: 680px; margin: 0 0 18px; }
.welcome-sub.small { font-size: 14.5px; }
.hero-card { background:
    linear-gradient(180deg, var(--surface), var(--surface-2));
  border: 1px solid var(--line-strong); border-radius: 20px; box-shadow: var(--shadow-sm); padding: clamp(26px,4.5vw,48px); position: relative; overflow: hidden; }
.hero-card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 4px; background: linear-gradient(90deg, var(--accent), var(--terra) 60%, var(--ochre)); }
.hero-card::after { content: ""; position: absolute; right: -60px; top: -60px; width: 220px; height: 220px; background: repeating-linear-gradient(45deg, transparent 0 10px, rgba(29,64,96,.05) 10px 11px); border-radius: 50%; pointer-events: none; }
.hero-card > * { position: relative; }
.consent { margin: 20px 0 0; font-size: 13.5px; color: var(--ink-soft); background: var(--accent-softer); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 13px 15px; max-width: 680px; }

.privacy { margin: 22px 0 0; max-width: 680px; display: grid; gap: 11px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
.privacy-head { grid-column: 1 / -1; margin: 0 0 1px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--moss); }
.privacy-row { display: flex; align-items: flex-start; gap: 13px; font-size: 14px; line-height: 1.5; color: var(--ink); }
.privacy-ic { flex: none; width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; color: var(--moss); background: var(--moss-soft); }
.privacy-ic svg { width: 19px; height: 19px; }
.privacy-tx { padding-top: 7px; }
.welcome-actions { margin-top: 26px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.save-hint { font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint); }

.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: clamp(18px,3vw,26px); }

.gp-head { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px; }
.gp-icon { flex: none; width: 50px; height: 50px; border-radius: 13px; display: grid; place-items: center; color: var(--accent); background: var(--surface); border: 1px solid var(--line-strong); box-shadow: var(--shadow-sm); }
.gp-icon svg { width: 26px; height: 26px; }
.gp-icon.info { color: var(--ink-soft); }
.gp-head h2 { font-family: var(--font-display); font-optical-sizing: auto; margin: 4px 0 6px; font-size: clamp(24px,3.6vw,34px); letter-spacing: -.018em; font-weight: 600; line-height: 1.08; }
.gp-desc { margin: 0; color: var(--ink-soft); font-size: 15px; max-width: 680px; }

.scalebar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 16px; padding: 12px 18px; margin: 0 0 18px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); }
.scalebar-title { font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); margin-right: 2px; }
.sb { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); }
.sb-num { width: 22px; height: 22px; border-radius: 6px; flex: none; display: grid; place-items: center; font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: #fff; }
.sb[data-n="1"] .sb-num { background: var(--v1); }
.sb[data-n="2"] .sb-num { background: var(--v2); }
.sb[data-n="3"] .sb-num { background: var(--v3c); }
.sb[data-n="4"] .sb-num { background: var(--v4); }
.sb[data-n="5"] .sb-num { background: var(--v5); }

.setup { margin-bottom: 24px; }
.usagepicker { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 20px 20px 8px; }
.usagepicker.needs { animation: shake .32s ease; border-color: var(--danger); }
.usagepicker-q { font-family: var(--font-display); font-optical-sizing: auto; font-weight: 600; font-size: 18px; letter-spacing: -.01em; margin: 0; }
.usagepicker-hint { display: block; font-family: var(--font-body); font-weight: 400; font-size: 13.5px; color: var(--ink-soft); margin-top: 5px; }
.usage-list { display: flex; flex-direction: column; margin-top: 10px; }
.usage-item { border-top: 1px solid var(--line); }
.usage-item:first-child { border-top: 0; }
.usage-toggle { display: flex; align-items: flex-start; gap: 13px; width: 100%; text-align: left; border: 0; background: none; font: inherit; color: var(--ink); cursor: pointer; padding: 15px 6px; border-radius: 10px; transition: background .12s ease; }
.usage-check { flex: none; display: grid; place-items: center; width: 23px; height: 23px; margin-top: 1px; border: 1.6px solid var(--line-strong); border-radius: 7px; background: var(--paper); color: #fff; transition: background .15s ease, border-color .15s ease, transform .12s ease; }
.usage-check svg { width: 15px; height: 15px; }
.usage-item.on > .usage-toggle .usage-check { background: var(--accent); border-color: var(--accent); }
.usage-item.done > .usage-toggle .usage-check { background: var(--moss); border-color: var(--moss); }
.usage-item.none.on > .usage-toggle .usage-check { background: var(--ink-soft); border-color: var(--ink-soft); }
.usage-body { flex: 1; min-width: 0; }
.usage-namerow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.usage-name { font-weight: 600; font-size: 15px; letter-spacing: -.005em; }
.usage-badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: .02em; color: var(--moss); background: var(--moss-soft); padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
.usage-badge svg { width: 12px; height: 12px; }
.usage-ex { display: block; margin-top: 7px; font-size: 13.5px; line-height: 1.5; color: var(--ink-soft); }

.ex-block { margin-top: 6px; }
.ex-block .ex-lead { display: block; font-weight: 600; color: var(--ink); font-size: 13px; margin-bottom: 7px; }
.ex-list { margin: 0; padding-left: 19px; display: flex; flex-direction: column; gap: 6px; }
.ex-list li { font-size: 13.5px; line-height: 1.5; color: var(--ink-soft); }
.ex-list li::marker { color: var(--accent); }
.info-pop .ex-block { margin: 0 0 20px; }

.usage-ex-det { margin: -4px 0 12px 36px; }
.usage-ex-sum { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; list-style: none; font-family: var(--font-mono); font-size: 11.5px; font-weight: 500; letter-spacing: .02em; color: var(--accent); padding: 3px 0; }
.usage-ex-sum::-webkit-details-marker { display: none; }
.usage-ex-sum::before { content: "▸"; font-size: 10px; transition: transform .15s ease; }
.usage-ex-det[open] .usage-ex-sum::before { transform: rotate(90deg); }
.usage-ex-det .usage-ex { margin-top: 4px; }
.usage-item.none .usage-name { color: var(--ink-soft); font-weight: 500; }

.toolsblock { margin-top: 16px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 20px; }
.toolsblock-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
.toolsblock-q { font-family: var(--font-display); font-optical-sizing: auto; font-weight: 600; font-size: 18px; letter-spacing: -.01em; margin: 0; }
.segmented.toolsmode .seg-opt { padding: 8px 16px; font-size: 13.5px; }
.toolsblock > .tools { margin-top: 14px; padding-top: 0; border-top: 0; }
.toolgroup { margin-top: 6px; }
.toolgroup + .toolgroup { border-top: 1px solid var(--line); }
.toolgroup-name { font-weight: 600; font-size: 14.5px; letter-spacing: -.005em; margin: 18px 0 0; }
.toolgroup > .tools { margin-top: 10px; padding-top: 0; border-top: 0; }

.segmented { display: inline-flex; background: var(--paper-2); border-radius: 11px; padding: 3px; gap: 3px; border: 1px solid var(--line); }
.seg-opt { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: 0; background: none; font: inherit; font-weight: 500; font-size: 14.5px; color: var(--ink-soft); padding: 9px 20px; border-radius: 8px; cursor: pointer; transition: background .15s ease, color .15s ease, box-shadow .15s ease; }
.seg-opt svg { width: 16px; height: 16px; }
.seg-opt.on { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }
.yesno.needs { animation: shake .32s ease; }
@keyframes shake { 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

.tools { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
.tools-instruction { margin: 0 0 12px; font-size: 14.5px; font-weight: 600; color: var(--ink); }
.toolchips { display: flex; flex-wrap: wrap; gap: 9px; }
.toolchips.needs { animation: shake .32s ease; }
.chip { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--line-strong); background: var(--surface); border-radius: 999px; padding: 9px 15px; font: inherit; font-weight: 500; font-size: 14px; color: var(--ink); cursor: pointer; transition: border-color .15s ease, background .15s ease, color .15s ease, transform .12s ease; }
.chip.selected { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
.chip .rank { display: grid; place-items: center; width: 20px; height: 20px; border-radius: 999px; background: var(--accent); color: #fff; font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
.chip.other { border-style: dashed; color: var(--ink-soft); }
.tools-hint { margin: 12px 0 0; font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint); }

.matrix-lead { margin: 4px 0 12px; font-size: 14.5px; font-weight: 500; color: var(--ink-soft); }
.matrix-wrap { position: relative; border: 1px solid var(--line-strong); border-radius: var(--radius); box-shadow: var(--shadow-sm); background: var(--surface); overflow: hidden; scroll-margin-top: calc(var(--topbar-h) + 60px); }

.matrix-scroll { overflow: auto; max-height: calc(100vh - 320px); max-height: calc(100svh - 320px); overscroll-behavior: contain; scroll-padding-left: 304px;
  
  scrollbar-width: none; -ms-overflow-style: none; }
.matrix-scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }

@media (hover: hover) and (pointer: fine) {
  .matrix-scroll { scrollbar-width: auto; scrollbar-color: var(--accent) var(--surface-2); }
  .matrix-scroll::-webkit-scrollbar { width: 14px; height: 16px; display: block; }
  .matrix-scroll::-webkit-scrollbar-track { background: var(--surface-2); border-top: 1px solid var(--line); }
  .matrix-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 999px; border: 3px solid var(--surface-2); min-width: 48px; min-height: 40px; }
  .matrix-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent-press); }
}
table.matrix { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
.matrix th, .matrix td { border-bottom: 1px solid var(--line); }
.matrix thead th.corner { position: -webkit-sticky; position: sticky; left: 0; top: 0; z-index: 40; width: 304px; min-width: 304px; max-width: 304px; background: var(--surface-2); text-align: left; padding: 13px 16px; font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); border-right: 1px solid var(--line-strong); border-bottom: 2px solid var(--line-strong); }
.matrix thead th.colhead { position: -webkit-sticky; position: sticky; top: 0; z-index: 30; background: var(--surface-2); color: var(--ink); font-size: 13px; font-weight: 600; line-height: 1.3; padding: 13px 12px; text-align: center; vertical-align: middle; border-right: 1px solid var(--line); border-bottom: 2px solid var(--line-strong); width: 134px; min-width: 134px; }

.matrix tbody th.qcell { position: -webkit-sticky; position: sticky; left: 0; z-index: 20; width: 304px; min-width: 304px; max-width: 304px; background: #f3eee2; text-align: left; padding: 15px 16px 15px 18px; font-weight: 400; font-size: 14px; line-height: 1.45; vertical-align: middle; border-right: 1px solid var(--line-strong); border-left: 4px solid #cdbf9f; }

.matrix tbody tr.qrow.cgstart th.qcell, .matrix tbody tr.qrow.cgstart td.answer { border-top: 2px solid var(--line-strong); }

.qgroup { display: block; margin: 0 0 9px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
.qgroup-title { display: block; font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink); }
.qgroup-help { display: block; margin-top: 4px; font-family: var(--font-body); font-size: 12px; line-height: 1.45; color: var(--ink-soft); }
.qtext { display: block; }
.matrix td.answer { background: var(--surface); padding: 7px 8px; text-align: center; vertical-align: middle; border-right: 1px solid var(--line); width: 134px; min-width: 134px; scroll-snap-align: start; }

.matrix thead th.colhead:not(.locked) { box-shadow: inset 0 -3px 0 var(--accent); }
.matrix thead th.colhead:not(.locked) .colhead-label { color: var(--accent); }
.matrix td.answer.missing { box-shadow: inset 0 0 0 2px var(--danger); background: var(--danger-soft) !important; }
.matrix thead th.colhead.locked { background: var(--paper-2); color: var(--ink-faint); }
.colhead-label { display: block; }
.colhead-note { display: block; margin-top: 4px; font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-faint); }

    }
    if (sec.grouped) {
      // two-level header: category band (row 1, spanning its sub-areas) + sub-area labels (row 2)
      var order = [], cnt = {};
      cols.forEach(function (c) { if (cnt[c.group] === undefined) { order.push(c.group); cnt[c.group] = 0; } cnt[c.group]++; });
      var gtr = document.createElement("tr"); gtr.className = "grouprow";

    // flat list of statements (construct group titles/explanations intentionally not shown)
    (sec.groups || []).forEach(function (g) {

        var qcell = el("th", "qcell");
        qcell.appendChild(el("span", "qtext", esc(q.text || "")));
        rtr.appendChild(qcell);
        cols.forEach(function (col) {
          var active = usageOf(sec, col) === "yes";
          var td = el("td", "answer" + (active ? "" : " locked") + grpCls(col)); td.setAttribute("data-key", keyOf(sec.id, q.id, col.id));

  function setupScrollCue(scrollEl, cueEl) {

  // ---------- interactions ----------
  // first interaction "activates" the section: any untouched task becomes "no" (single-question
  // semantics — an unticked task means "I do not use AI for it").
  function baselineSection(sec) { (sec.columns || []).forEach(function (c) { if (!usageOf(sec, c)) answers[useKey(sec, c)] = "no"; }); }

  // generic tool toggle/add, parameterized by where the list is read/written (per-col or shared)
  function changeTools(get, set, name) {

  }
  function onCellChange(e) {

  // light refresh of usage-row "Done" state without touching the matrix inputs (keeps radio focus)
  function updateSetupBadges() {

      var colId = itemEl.getAttribute("data-col"); if (!colId) return;
      var col = (sec.columns || []).filter(function (c) { return c.id === colId; })[0]; if (!col) return;
      var on = usageOf(sec, col) === "yes", done = on && colResolved(sec, col);
      itemEl.className = "usage-item" + (on ? " on" : "") + (done ? " done" : "");

  }
  function onNext() {
    var sec = currentStep.sec, step = currentStep;
    if (extrasOf(sec).length && !extrasComplete(sec)) { flagBg(extrasOf(sec).map(function (q) { return q.id; }), "Please answer the questions at the top of this section."); return; }
    var cols = sec.columns || [], host = setupHostEl();
    var answered = cols.every(function (c) { return usageOf(sec, c) !== ""; });
    if (cols.length && !answered) {
      showToast("Please choose which tasks you use AI for, or select “I don’t use AI for any of these”.", true);
      var pick = host && host.querySelector(".usagepicker");
      if (pick) { pick.classList.add("needs"); setTimeout(function () { pick.classList.remove("needs"); }, 400); pick.scrollIntoView({ behavior: "smooth", block: "center" }); }
      return;
    }

      var col = cols[i];

        var target = host && (per ? host.querySelector('.toolgroup[data-col="' + col.id + '"]') : host.querySelector(".toolsblock"));
        if (target) { var tc = target.querySelector(".toolchips"); if (tc) tc.classList.add("needs"); target.scrollIntoView({ behavior: "smooth", block: "center" }); }

  function flagFirstMissingCell(sec, col) {

      var a0 = el("div", "done-actions");
      var fix = el("button", "btn btn-primary", "Go to first unfinished"); fix.type = "button";
      fix.addEventListener("click", function () { if (HAS_INTAKE && !aboutComplete()) { go("#about"); return; } var st = firstIncompleteStep(); if (st) go(stepHash(st)); });

      sub.addEventListener("click", function () {
        sub.disabled = true; sub.textContent = "Submitting…";

        });

  // ---------- access gate + delivery (Google Apps Script) ----------
  function getParam(name) { var m = new RegExp("[?&]" + name + "=([^&#]*)").exec(location.search || ""); return m ? decodeURIComponent(m[1]) : ""; }

    var payload = { background: background(), sections: buildExportSections() };
    function confirm() { setTimeout(function () { validateToken(TOKEN, function (status) { cb(status === "recorded"); }); }, 1400); }
    try {
      fetch(CFG.webAppUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ t: TOKEN, payload: payload }) })
        .then(confirm, confirm);
    } catch (e) { confirm(); }
  }
  // open mode: POST answers tagged with this device's id, then confirm the row landed (JSONP).
  function submitOpen(cb) {
    var d = deviceId();
    var payload = { background: background(), sections: buildExportSections() };
    function confirm() { setTimeout(function () { checkOpen(d, cb); }, 1400); }
    try {
      fetch(SUBMIT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ d: d, payload: payload }) })
        .then(confirm, confirm);
    } catch (e) { confirm(); }

  function checkOpen(d, cb) { jsonp(SUBMIT_URL + "?action=check&d=" + encodeURIComponent(d), function (err, data) { cb(!err && !!data && data.recorded === true); }); }

    box.appendChild(el("div", "gate-icon ok", "✓"));
    box.appendChild(el("h2", null, "You have already responded"));
    box.appendChild(el("p", null, "This device has already submitted a response. Thank you for taking part in this METU study."));

  }
  function showGate(kind) {

  // ---------- export ----------

  // ---------- render / init ----------
  function render() {

  function init() {

})();

    if (panning) {
      panning = false;
      document.documentElement.style.scrollBehavior = '';
      document.body.classList.remove('grabpan-active');
      if (moved) { // swallow the click that would otherwise fire right after a drag
        var supp = function (ev) { ev.stopPropagation(); ev.preventDefault(); document.removeEventListener('click', supp, true); };
        document.addEventListener('click', supp, true);
        setTimeout(function () { document.removeEventListener('click', supp, true); }, 0);
      }
    }
    down = false;
  }
  document.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return;
    down = true; moved = false; target = e.target;
    startX = e.clientX; startY = e.clientY;
  }, true);
  document.addEventListener('mousemove', function (e) {
    if (!down) return;
    if (!panning) {
      if (Math.abs(e.clientX - startX) <= THRESH && Math.abs(e.clientY - startY) <= THRESH) return;
      begin(e);
    }
    vSet(vTarget, vStart - (e.clientY - anchorY));
    if (hTarget) hTarget.scrollLeft = hStart - (e.clientX - anchorX);
    e.preventDefault();
  }, true);
  document.addEventListener('mouseup', end, true);
  window.addEventListener('blur', end);
})();
</script>
</body>
</html>
